<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>泰迪科技 - AI一键生成PPT</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: radial-gradient(circle at 50% 50%, #1e1e38 0%, #0c0c14 100%); display: flex; justify-content: center; align-items: center; height: 100vh; color: #fff; }
        .card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); padding: 40px; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); width: 100%; max-width: 550px; text-align: center; backdrop-filter: blur(10px); }
        h1 { font-size: 28px; font-weight: 700; background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
        .subtitle { font-size: 14px; color: #a0aec0; margin-bottom: 35px; }
        .input-group { position: relative; margin-bottom: 25px; }
        input[type="text"] { width: 100%; padding: 18px 20px; background: rgba(0, 0, 0, 0.2); border: 2px solid rgba(255, 255, 255, 0.1); border-radius: 12px; font-size: 16px; color: #fff; transition: all 0.3s; }
        input[type="text"]:focus { outline: none; border-color: #00f2fe; box-shadow: 0 0 15px rgba(0, 242, 254, 0.2); }
        button { width: 100%; background: linear-gradient(135deg, #00c6ff 0%, #0072ff 100%); color: white; border: none; padding: 18px; font-size: 16px; font-weight: bold; border-radius: 12px; cursor: pointer; transition: all 0.3s; letter-spacing: 1px; }
        button:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0, 114, 255, 0.4); }
        button:disabled { background: #4a5568; transform: none; box-shadow: none; cursor: not-allowed; }
        #log-area { margin-top: 25px; min-height: 24px; font-size: 14px; color: #cbd5e0; line-height: 1.5; }
        .spinner { display: inline-block; width: 18px; height: 18px; border: 3px solid rgba(255,255,255,.3); border-radius: 50%; border-top-color: #00f2fe; animation: spin 0.8s linear infinite; margin-right: 10px; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="card">
        <h1>AI一键生成PPT演示文稿</h1>
        <div class="subtitle">智能办公工具集 - 交付产品原型</div>
        <div class="input-group">
            <input type="text" id="topic" placeholder="输入 PPT 的主题（例如：人工智能的历史发展）" autocomplete="off">
        </div>
        <button id="submitBtn" onclick="triggerBuild()">一键生成专业演示文稿</button>
        <div id="log-area"></div>
    </div>

    <script>
        async function triggerBuild() {
            const topicInput = document.getElementById('topic');
            const submitBtn = document.getElementById('submitBtn');
            const logArea = document.getElementById('log-area');
            const topic = topicInput.value.trim();

            if (!topic) {
                logArea.innerHTML = "<span style='color: #fc8181;'> 请先输入所需生成的主题大纲！</span>";
                return;
            }

            // 锁定输入框和按钮，防止恶意多重并发
            topicInput.disabled = true;
            submitBtn.disabled = true;
            submitBtn.innerHTML = "<div class='spinner'></div> 正在解析大纲并排版模板...";
            logArea.innerHTML = "正在联系 AI 驱动引擎建立内容，大约需要 60-180秒，请稍后...";

            try {
                const response = await fetch('http://127.0.0.1:8000/generate_ppt', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ topic: topic })
                });

                if (!response.ok) {
                    const payload = await response.json();
                    throw new Error(payload.detail || "服务端请求或排版规则校验不通过");
                }

                logArea.innerHTML = "生成完毕！正在唤醒浏览器下载通道...";
                const blob = await response.blob();
                const blobUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = blobUrl;
                a.download = `${topic}_演示汇报.pptx`;
                document.body.appendChild(a);
                a.click();
                a.remove();
                window.URL.revokeObjectURL(blobUrl);

                logArea.innerHTML = "<span style='color: #68d391;'> 恭喜！演示文稿成功生成并自动开始下载！</span>";
            } catch (err) {
                logArea.innerHTML = `<span style='color: #fc8181;'>异常警告: ${err.message}</span>`;
            } finally {
                // 恢复页面交互可用性
                topicInput.disabled = false;
                submitBtn.disabled = false;
                submitBtn.innerHTML = "一键生成专业演示文稿";
            }
        }
    </script>
</body>
</html>
